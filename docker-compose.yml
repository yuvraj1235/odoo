services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    restart: always
    ports:
      - "8010:8000"  # Map host port 8010 to container 8000 for direct API/swagger access
    volumes:
      # Persist SQLite database across container restarts
      - ./backend/assetflow.db:/app/assetflow.db
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    networks:
      - assetflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assetflow-frontend
    restart: always
    ports:
      - "80:80"      # Web application accessible directly at http://localhost/
      - "3000:80"    # Also mapped to 3000 for convenience
    depends_on:
      - backend
    networks:
      - assetflow-network

networks:
  assetflow-network:
    driver: bridge
